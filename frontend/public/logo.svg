<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StudySphere">
  <defs>
    <linearGradient id="ssg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#7b35e6"/>
    </linearGradient>
  </defs>

  <!-- globe -->
  <g fill="none" stroke="url(#ssg)" stroke-width="2.4" stroke-linecap="round">
    <circle cx="60" cy="66" r="30"/>
    <ellipse cx="60" cy="66" rx="11" ry="30"/>
    <ellipse cx="60" cy="66" rx="22" ry="30"/>
    <line x1="30" y1="66" x2="90" y2="66"/>
    <path d="M34 50 H86"/>
    <path d="M34 82 H86"/>
  </g>

  <!-- orbit + planet -->
  <g transform="rotate(-24 60 60)">
    <ellipse cx="60" cy="60" rx="46" ry="17" fill="none" stroke="url(#ssg)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <circle cx="98" cy="40" r="5" fill="url(#ssg)"/>

  <!-- graduation cap -->
  <g>
    <path d="M60 28 L88 39 L60 50 L32 39 Z" fill="#1b2a6b"/>
    <path d="M46 45 L74 45 L74 55 Q60 62 46 55 Z" fill="#243a8f"/>
    <line x1="88" y1="39" x2="88" y2="52" stroke="#1b2a6b" stroke-width="2"/>
    <circle cx="88" cy="54" r="3" fill="#1b2a6b"/>
  </g>

  <!-- stars -->
  <g fill="url(#ssg)">
    <path d="M60 5 l2.1 5.2 5.2 2.1 -5.2 2.1 -2.1 5.2 -2.1 -5.2 -5.2 -2.1 5.2 -2.1 z"/>
    <path d="M43 13 l1.4 3.5 3.5 1.4 -3.5 1.4 -1.4 3.5 -1.4 -3.5 -3.5 -1.4 3.5 -1.4 z"/>
    <path d="M77 13 l1.4 3.5 3.5 1.4 -3.5 1.4 -1.4 3.5 -1.4 -3.5 -3.5 -1.4 3.5 -1.4 z"/>
  </g>
</svg>
