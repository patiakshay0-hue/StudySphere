# Render Blueprint — deploy StudySphere as a single Docker web service.
# In the Render dashboard: New + -> Blueprint -> connect this repo.
# Then set ANTHROPIC_API_KEY / RAZORPAY_* in the service's Environment tab.
services:
  - type: web
    name: studysphere
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Secret values — set these in the Render dashboard (kept out of git).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      - key: STUDYSPHERE_MODEL
        value: claude-opus-4-8
      - key: STUDYSPHERE_DATA_DIR
        value: /data

    # ---------------------------------------------------------------------
    # IMPORTANT: the free plan has an EPHEMERAL filesystem — the SQLite DB
    # resets on every deploy/restart. For persistent accounts & uploads,
    # upgrade the plan and uncomment the disk below (Render disks need a
    # paid instance). Alternatively migrate to Postgres.
    # ---------------------------------------------------------------------
    # disk:
    #   name: studysphere-data
    #   mountPath: /data
    #   sizeGB: 1
